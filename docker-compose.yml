# Purrlington Island — full stack for Coolify / local Docker Compose.
# PUBLIC: gateway (:8000) and frontend (:5173->80). Everything else is private.
# Values default to the required-env spreadsheet defaults; override via the root .env / Coolify.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./services/beach/db/init:/beach-init:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  airport:
    build: ./services/airport
    environment:
      PORT: "3001"
      DATABASE_PATH: /data/airport.db
      BROADCAST_SERVICE_URL: http://broadcast:3002
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
      SIMULATION_START_TIME: ${SIMULATION_START_TIME:-2026-06-20T00:00:00Z}
      GAME_SPEED: ${GAME_SPEED:-300}
      EU_GATES: ${EU_GATES:-3}
      ALL_GATES: ${ALL_GATES:-2}
      PROCESSING_TIME_EU: ${PROCESSING_TIME_EU:-300}
      PROCESSING_TIME_ALL: ${PROCESSING_TIME_ALL:-600}
    volumes:
      - airport_data:/data
    # CRITICAL: never scale airport beyond 1 replica (in-memory gate threads/queues).
    restart: unless-stopped

  hotel:
    build: ./services/hotel
    environment:
      PORT: "3000"
      DATABASE_URL: ${HOTEL_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/hotel}
      SIMULATION_START_TIME: ${SIMULATION_START_TIME:-2026-06-20T00:00:00Z}
      GAME_SPEED: ${GAME_SPEED:-300}
      AIRPORT_SERVICE_URL: http://airport:3001
      BROADCAST_SERVICE_URL: http://broadcast:3002
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  beach:
    build: ./services/beach
    environment:
      APP_PORT: "8080"
      JDBC_URL: ${BEACH_JDBC_URL:-jdbc:postgresql://postgres:5432/beach}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  parrot:
    build: ./services/parrot
    environment:
      PORT: "3003"
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-meta-llama/llama-3.1-8b-instruct}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.4}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-600}
      LLM_TOP_P: ${LLM_TOP_P:-1.0}
      AIRPORT_SERVICE_URL: http://airport:3001
      HOTEL_SERVICE_URL: http://hotel:3000
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
    restart: unless-stopped

  # Second parrot instance so the gateway PARROT_SERVICE_URL pool round-robins (elasticity).
  parrot-b:
    build: ./services/parrot
    environment:
      PORT: "3003"
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-meta-llama/llama-3.1-8b-instruct}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.4}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-600}
      LLM_TOP_P: ${LLM_TOP_P:-1.0}
      AIRPORT_SERVICE_URL: http://airport:3001
      HOTEL_SERVICE_URL: http://hotel:3000
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
    restart: unless-stopped

  broadcast:
    build: ./services/broadcast
    environment:
      PORT: "3002"
      CORS_ORIGIN: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      FE_TOKEN: ${FE_TOKEN:-fe-token}
      HOTEL_TOKEN: ${HOTEL_TOKEN:-hotel-token}
      BEACH_TOKEN: ${BEACH_TOKEN:-beach-token}
      AIRPORT_TOKEN: ${AIRPORT_TOKEN:-airport-token}
      PARROT_TOKEN: ${PARROT_TOKEN:-parrot-token}
    restart: unless-stopped

  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT:-8000}:8000"   # the ONLY backend exposed publicly
    environment:
      PORT: "8000"
      AIRPORT_SERVICE_URL: http://airport:3001
      HOTEL_SERVICE_URL: http://hotel:3000
      BEACH_SERVICE_URL: http://beach:8080
      BROADCAST_SERVICE_URL: http://broadcast:3002
      PARROT_SERVICE_URL: http://parrot:3003,http://parrot-b:3003
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
      GATEWAY_CACHE_TTL: ${GATEWAY_CACHE_TTL:-0}
      GATEWAY_RATE_LIMIT: ${GATEWAY_RATE_LIMIT:-0}
      GATEWAY_RATE_WINDOW: ${GATEWAY_RATE_WINDOW:-1m}
    depends_on:
      - airport
      - hotel
      - beach
      - parrot
      - parrot-b
      - broadcast
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # COMPILE-TIME: set to the PUBLIC gateway URL in Coolify, not localhost.
        VITE_GATEWAY_URL: ${VITE_GATEWAY_URL:-http://localhost:8000}
        VITE_SIMULATION_START_TIME: ${SIMULATION_START_TIME:-2026-06-20T00:00:00Z}
        VITE_GAME_SPEED: ${GAME_SPEED:-300}
        VITE_MOCK: ${VITE_MOCK:-false}
        VITE_TRAFFIC_GENERATOR: ${VITE_TRAFFIC_GENERATOR:-on}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  pgdata:
  airport_data:
